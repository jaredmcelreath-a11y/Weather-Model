name: Log forecast snapshot

# Records a model snapshot to the forward log every 15 min so live self-scoring,
# per-lead sigma, and the intraday consensus history keep accumulating in the
# cloud — independent of any computer. The logs live on an orphan `data` branch
# (just those files), kept separate from the deployed branch so these commits
# don't restart the app.

on:
  # GitHub's own scheduler is best-effort and unreliable (it dropped most of the
  # 30-min runs, firing only ~3x/day). So the schedule is a free fallback only;
  # the dependable 15-min cadence comes from an external cron (cron-job.org)
  # POSTing a repository_dispatch of type `log-snapshot` to the GitHub API.
  schedule:
    - cron: "7,22,37,52 * * * *"  # fallback every 15 min (GitHub honors this loosely)
  workflow_dispatch: {}         # allow manual runs from the Actions tab
  repository_dispatch:
    types: [log-snapshot]       # external scheduler triggers this for reliable timing

permissions:
  contents: write               # lets the built-in token push the data branch

concurrency:
  # One shared group across all triggers (external cron, schedule fallback, manual)
  # so they serialize on the data branch — never two force-pushes racing. With
  # frequent 15-min runs the fallback schedule can fire alongside the external
  # cron; cancel-in-progress collapses such overlaps to the newest run. That's
  # safe and preferable here because every run captures a full fresh snapshot, so
  # a superseded in-flight run carries nothing the newer one doesn't recompute.
  group: forecast-log
  cancel-in-progress: true

jobs:
  log:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore existing logs from the data branch
        run: |
          if git ls-remote --exit-code --heads origin data >/dev/null 2>&1; then
            git fetch --depth=1 origin data
            git show origin/data:forecast_log.jsonl > forecast_log.jsonl || true
            git show origin/data:consensus_history.jsonl > consensus_history.jsonl || true
            git show origin/data:settlements.jsonl > settlements.jsonl || true
          fi

      - name: Append this snapshot
        run: python scheduled_log.py

      - name: Publish the logs to the data branch
        run: |
          set -e
          tmp="$(mktemp -d)"
          cp forecast_log.jsonl "$tmp/forecast_log.jsonl"
          [ -f consensus_history.jsonl ] && cp consensus_history.jsonl "$tmp/consensus_history.jsonl"
          [ -f settlements.jsonl ] && cp settlements.jsonl "$tmp/settlements.jsonl"
          cd "$tmp"
          git init -q
          git config user.name "weather-log-bot"
          git config user.email "actions@users.noreply.github.com"
          git checkout -q -b data
          git add forecast_log.jsonl
          [ -f consensus_history.jsonl ] && git add consensus_history.jsonl
          [ -f settlements.jsonl ] && git add settlements.jsonl
          git commit -q -m "log: snapshot $(date -u +%FT%TZ)"
          git push -fq \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" \
            data
