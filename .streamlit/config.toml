# Dark dashboard theme (Charcoal default). The runtime "Settings" control can
# switch the palette to Deep slate by injecting CSS on top of this base; these
# values just guarantee the first paint matches the default instead of flashing.
[theme]
base = "dark"
primaryColor = "#7FB79A"
backgroundColor = "#201B18"
secondaryBackgroundColor = "#2B2420"
textColor = "#F7F1E6"
font = "serif"
